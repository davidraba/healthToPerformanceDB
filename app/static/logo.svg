<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="800" height="400">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="400" y2="0">
      <stop offset="0%" stop-color="#2E86AB"/>
      <stop offset="100%" stop-color="#1B4965"/>
    </linearGradient>
  </defs>

  <g transform="translate(200, 75)">
    <!-- Heartbeat pulse -->
    <polyline points="-150,0 -120,0 -105,-30 -90,30 -75,-40 -60,10 -45,0 -20,0"
              fill="none" stroke="#E63946" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Arrow -->
    <line x1="10" y1="0" x2="80" y2="0" stroke="#2E86AB" stroke-width="2.5" stroke-dasharray="5,4"/>
    <polygon points="80,-7 92,0 80,7" fill="#2E86AB"/>

    <!-- DB cylinder -->
    <ellipse cx="135" cy="-20" rx="40" ry="12" fill="#1B4965" opacity="0.9"/>
    <rect x="95" y="-20" width="80" height="40" fill="#1B4965" opacity="0.85"/>
    <ellipse cx="135" cy="20" rx="40" ry="12" fill="#1B4965" opacity="0.9"/>
    <rect x="108" y="-12" width="8" height="24" rx="2" fill="#CAE9FF" opacity="0.8"/>
    <rect x="122" y="-8" width="8" height="20" rx="2" fill="#CAE9FF" opacity="0.6"/>
    <rect x="136" y="-14" width="8" height="28" rx="2" fill="#CAE9FF" opacity="0.8"/>
    <rect x="150" y="-6" width="8" height="16" rx="2" fill="#CAE9FF" opacity="0.6"/>
  </g>

  <text x="200" y="140" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="24" fill="#1B4965" font-weight="800" letter-spacing="1">
    healthToPerformanceDB
  </text>
  <text x="200" y="165" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#2E86AB" font-weight="600" letter-spacing="3">
    ICAR ADE v1.5 · FASTAPI · TinyDB
  </text>
  <line x1="140" y1="178" x2="260" y2="178" stroke="url(#accent)" stroke-width="1.5" opacity="0.4"/>
</svg>

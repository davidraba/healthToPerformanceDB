<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E86AB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1B4965;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#62B6CB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E86AB;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradDb" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5FA8D3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1B4965;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Fondo redondo -->
  <circle cx="140" cy="150" r="110" fill="url(#grad1)" opacity="0.08"/>

  <!-- Icono: Corazón con latido (Health) -->
  <g transform="translate(60, 80)">
    <!-- Línea de latido -->
    <polyline points="0,70 20,70 30,40 40,90 50,20 60,70 80,70"
              fill="none" stroke="#E63946" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Corazón -->
    <path d="M40,95 C40,95 15,75 15,55 C15,40 25,30 40,30 C55,30 65,40 65,55 C65,75 40,95 40,95Z"
          fill="#E63946" opacity="0.15"/>
  </g>

  <!-- Flecha de transformación -->
  <g transform="translate(210, 125)">
    <line x1="0" y1="25" x2="120" y2="25" stroke="#62B6CB" stroke-width="3" stroke-dasharray="8,5"/>
    <polygon points="120,18 135,25 120,32" fill="#62B6CB"/>
    <text x="45" y="12" font-family="Arial, sans-serif" font-size="14" fill="#62B6CB" font-weight="bold">
      <tspan>to</tspan>
    </text>
  </g>

  <!-- Icono: Base de datos (Performance DB) -->
  <g transform="translate(360, 85)">
    <!-- Cilindro de base de datos -->
    <ellipse cx="80" cy="30" rx="70" ry="20" fill="url(#gradDb)" opacity="0.9"/>
    <rect x="10" y="30" width="140" height="70" fill="url(#gradDb)" opacity="0.8"/>
    <ellipse cx="80" cy="100" rx="70" ry="20" fill="url(#gradDb)" opacity="0.9"/>
    <!-- Líneas de la base de datos -->
    <ellipse cx="80" cy="100" rx="70" ry="20" fill="none" stroke="#CAE9FF" stroke-width="1.5" opacity="0.5"/>
    <line x1="10" y1="50" x2="10" y2="100" stroke="#CAE9FF" stroke-width="1.5" opacity="0.4"/>
    <line x1="150" y1="50" x2="150" y2="100" stroke="#CAE9FF" stroke-width="1.5" opacity="0.4"/>
    <!-- Barras de rendimiento -->
    <rect x="35" y="45" width="12" height="40" rx="3" fill="#CAE9FF" opacity="0.9"/>
    <rect x="55" y="55" width="12" height="30" rx="3" fill="#CAE9FF" opacity="0.7"/>
    <rect x="75" y="40" width="12" height="45" rx="3" fill="#CAE9FF" opacity="0.9"/>
    <rect x="95" y="50" width="12" height="35" rx="3" fill="#CAE9FF" opacity="0.7"/>
    <rect x="115" y="42" width="12" height="43" rx="3" fill="#CAE9FF" opacity="0.9"/>
  </g>

  <!-- Texto principal -->
  <text x="140" y="235" font-family="'Segoe UI', Arial, sans-serif" font-size="28" fill="#1B4965" font-weight="800" text-anchor="middle" letter-spacing="1">
    healthToPerformanceDB
  </text>

  <!-- Subtítulo -->
  <text x="140" y="265" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#62B6CB" font-weight="600" text-anchor="middle" letter-spacing="3">
    ICAR ADE v1.5 — FASTAPI — TinyDB
  </text>

  <!-- Línea decorativa inferior -->
  <line x1="260" y1="278" x2="440" y2="278" stroke="url(#grad2)" stroke-width="2" opacity="0.5"/>
</svg>
